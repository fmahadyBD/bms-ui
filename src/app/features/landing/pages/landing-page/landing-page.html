<div class="landing-container">
  <div class="landing-inner">

    <!-- Logo: starts centered via padding, shrinks to top -->
    <div class="logo-section" [class.slide-up]="logoAnimated">
      <div class="logo-wrapper">
        <img src="assets/logo.png" alt="BMS Logo" class="main-logo" />
        <h1 class="logo-title">Bus Management</h1>
        <p class="logo-subtitle">Software Solution</p>
      </div>
    </div>

    <!-- Auth card: fades in below logo naturally -->
    <div class="auth-section" [class.show-auth]="logoAnimated">
      <div class="auth-card">

        <div class="auth-header">
          <div class="header-icon">
            <i class="fas fa-bus"></i>
          </div>
          <h3>{{ showLogin ? 'Welcome Back' : 'Create Account' }}</h3>
          <p>{{ showLogin ? 'Sign in to continue' : 'Join the Bus Management System' }}</p>
        </div>

        <div class="auth-body">
          <div *ngIf="showLogin" class="auth-form">
            <app-login></app-login>
          </div>
          <div *ngIf="!showLogin" class="auth-form">
            <app-register></app-register>
          </div>
        </div>

        <div class="auth-footer">
          <p *ngIf="showLogin">
            Don't have an account?
            <button class="link-btn" (click)="showLogin = false">
              Register here <i class="fas fa-arrow-right"></i>
            </button>
          </p>
          <p *ngIf="!showLogin">
            Already have an account?
            <button class="link-btn" (click)="showLogin = true">
              <i class="fas fa-arrow-left"></i> Login here
            </button>
          </p>
        </div>

      </div>
    </div>

  </div>
</div>
