<div class="container mt-4">
  <div class="row">
    <!-- Create Survey Form -->
    <div class="col-md-5">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h4>Create Transport Survey</h4>
        </div>
        <div class="card-body">
          <form [formGroup]="surveyForm" (ngSubmit)="createSurvey()">
            <div class="mb-3">
              <label>Title</label>
              <input type="text" class="form-control" formControlName="title">
            </div>
            
            <div class="mb-3">
              <label>Description</label>
              <textarea class="form-control" formControlName="description"></textarea>
            </div>
            
            <div class="row mb-3">
              <div class="col">
                <label>Start Date</label>
                <input type="date" class="form-control" formControlName="startDate">
              </div>
              <div class="col">
                <label>End Date</label>
                <input type="date" class="form-control" formControlName="endDate">
              </div>
            </div>
            
            <h5>Questions</h5>
            <div formArrayName="questions">
              <div *ngFor="let q of questions.controls; let i=index" [formGroupName]="i" class="border p-3 mb-2">
                <div class="mb-2">
                  <input type="text" class="form-control" formControlName="questionText" placeholder="Question">
                </div>
                <div class="row">
                  <div class="col">
                    <select class="form-control" formControlName="questionType">
                      <option value="TEXT">Text Answer</option>
                      <option value="SINGLE_CHOICE">Single Choice</option>
                      <option value="MULTIPLE_CHOICE">Multiple Choice</option>
                    </select>
                  </div>
                  <div class="col">
                    <input type="text" class="form-control" formControlName="options" placeholder="Options (comma separated)">
                  </div>
                  <div class="col-auto">
                    <label class="me-2">Required</label>
                    <input type="checkbox" formControlName="required">
                  </div>
                  <div class="col-auto">
                    <button type="button" class="btn btn-danger btn-sm" (click)="removeQuestion(i)">Remove</button>
                  </div>
                </div>
              </div>
            </div>
            
            <button type="button" class="btn btn-secondary mb-3" (click)="addQuestion()">+ Add Question</button>
            <button type="submit" class="btn btn-primary w-100">Create Survey</button>
          </form>
        </div>
      </div>
    </div>
    
    <!-- List of Surveys -->
    <div class="col-md-7">
      <div class="card">
        <div class="card-header bg-info text-white">
          <h4>Existing Surveys</h4>
        </div>
        <div class="card-body">
          <div *ngFor="let survey of surveys" class="border-bottom mb-3 pb-2">
            <h5>{{survey.title}}</h5>
            <p>{{survey.description}}</p>
            <small>Date: {{survey.startDate}} to {{survey.endDate}}</small>
            <button class="btn btn-danger btn-sm float-end" (click)="deleteSurvey(survey.id)">Delete</button>
          </div>
          <div *ngIf="surveys.length === 0" class="text-center text-muted">
            No surveys created yet
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
