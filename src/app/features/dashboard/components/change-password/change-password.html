<div class="change-password-container">
  <h3>Change Password</h3>
  
  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Current Password</label>
      <input type="password" formControlName="oldPassword" class="form-control">
    </div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" formControlName="newPassword" class="form-control">
      <small>Minimum 8 characters</small>
    </div>

    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" formControlName="confirmPassword" class="form-control">
      <div class="error" *ngIf="passwordForm.hasError('mismatch') && passwordForm.get('confirmPassword')?.touched">
        Passwords do not match
      </div>
    </div>

    <div class="success-message" *ngIf="successMessage">
      {{ successMessage }}
    </div>
    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button type="submit" [disabled]="loading || passwordForm.invalid" class="btn-submit">
      {{ loading ? 'Changing...' : 'Change Password' }}
    </button>
  </form>
</div>

<form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label>Current Password</label>
    <input type="password" formControlName="oldPassword" class="form-control">
  </div>
  
  <div class="form-group">
    <label>New Password</label>
    <input type="password" formControlName="newPassword" class="form-control">
    <small *ngIf="passwordForm.get('newPassword')?.hasError('minlength')" class="error">
      Password must be at least 8 characters
    </small>
  </div>
  
  <div class="form-group">
    <label>Confirm New Password</label>
    <input type="password" formControlName="confirmPassword" class="form-control">
    <small *ngIf="passwordForm.hasError('mismatch') && passwordForm.get('confirmPassword')?.touched" class="error">
      Passwords do not match
    </small>
  </div>
  
  <div class="form-actions">
    <button type="submit" [disabled]="loading">Change Password</button>
  </div>
  
  <div *ngIf="successMessage" class="alert success">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>
</form>
