<nav class="navbar">
  <div class="navbar-container">
    <!-- Logo -->
    <div class="logo" (click)="navigateToDashboard()">
      <div class="logo-icon">🚌</div>
      <div class="logo-text">
        <span class="logo-main">BusManager</span>
      </div>
    </div>

    <!-- Mobile Menu Button -->
    <button class="mobile-menu-btn" (click)="toggleMobileMenu()" [class.active]="mobileMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Navigation Links -->
    <div class="nav-links" [class.mobile-open]="mobileMenuOpen">
      <a class="nav-link" (click)="navigateToDashboard()">Dashboard</a>
      <a class="nav-link" (click)="navigateToStudents()">Students</a>
      <a class="nav-link" (click)="navigateToBuses()">Buses</a>
      <a class="nav-link" (click)="navigateToRoutes()">Routes</a>
      <a class="nav-link" (click)="navigateToReports()">Reports</a>
    </div>

    <!-- Profile Section -->
    <div class="profile-section">
      <div class="profile-btn" (click)="toggleProfileDropdown($event)">
        <div class="avatar">
          {{ (userName | slice:0:2).toUpperCase() }}
        </div>
        <div class="profile-info">
          <span class="profile-name">{{ userName }}</span>
          <span class="profile-email">{{ userEmail }}</span>
        </div>
        <span class="chevron" [class.open]="showProfileDropdown">▼</span>
      </div>

      <div class="profile-dropdown" *ngIf="showProfileDropdown">
        <div class="dropdown-header">
          <div class="dropdown-avatar">
            {{ (userName | slice:0:2).toUpperCase() }}
          </div>
          <h4>{{ userName }}</h4>
          <p>{{ userEmail }}</p>
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item" (click)="openChangePassword($event)">Change Password</div>
        <div class="dropdown-item" (click)="navigateToProfile($event)">Profile Settings</div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item logout-item" (click)="logout($event)">Logout</div>
      </div>
    </div>
  </div>
</nav>

<!-- Change Password Modal -->
<div class="modal-overlay" *ngIf="showChangePasswordModal" (click)="closeChangePasswordModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Change Password</h3>
      <button class="modal-close" (click)="closeChangePasswordModal()">✕</button>
    </div>
    <div class="modal-body">
      <app-change-password (passwordChanged)="closeChangePasswordModal()"></app-change-password>
    </div>
  </div>
</div>
