
<div class="request-container">
  <div class="request-card">
    <div class="card-header">
      <h1>🚌 New Bus Request</h1>
      <p>Submit a request for a new bus service</p>
    </div>
    
    <div class="card-body">
      <div *ngIf="successMessage" class="alert alert-success">
        {{ successMessage }}
      </div>
      
      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>
      
      <form (ngSubmit)="onSubmit()" #busForm="ngForm">
        <div class="form-group">
          <label for="busName">Bus Name *</label>
          <input type="text" 
                 id="busName" 
                 [(ngModel)]="busRequest.busName" 
                 name="busName"
                 required
                 class="form-control"
                 placeholder="Enter bus name">
          <div *ngIf="submitted && !busRequest.busName" class="error-message">
            Bus name is required
          </div>
        </div>
        
        <div class="form-group">
          <label for="busNumber">Bus Number *</label>
          <input type="text" 
                 id="busNumber" 
                 [(ngModel)]="busRequest.busNumber" 
                 name="busNumber"
                 required
                 class="form-control"
                 placeholder="Enter bus number">
          <div *ngIf="submitted && !busRequest.busNumber" class="error-message">
            Bus number is required
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="driverName">Driver Name *</label>
            <input type="text" 
                   id="driverName" 
                   [(ngModel)]="busRequest.driverName" 
                   name="driverName"
                   required
                   class="form-control"
                   placeholder="Enter driver name">
            <div *ngIf="submitted && !busRequest.driverName" class="error-message">
              Driver name is required
            </div>
          </div>
          
          <div class="form-group">
            <label for="driverPhone">Driver Phone *</label>
            <input type="tel" 
                   id="driverPhone" 
                   [(ngModel)]="busRequest.driverPhone" 
                   name="driverPhone"
                   required
                   class="form-control"
                   placeholder="Enter driver phone">
            <div *ngIf="submitted && !busRequest.driverPhone" class="error-message">
              Driver phone is required
            </div>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="helperName">Helper Name</label>
            <input type="text" 
                   id="helperName" 
                   [(ngModel)]="busRequest.helperName" 
                   name="helperName"
                   class="form-control"
                   placeholder="Enter helper name (optional)">
          </div>
          
          <div class="form-group">
            <label for="helperPhone">Helper Phone</label>
            <input type="tel" 
                   id="helperPhone" 
                   [(ngModel)]="busRequest.helperPhone" 
                   name="helperPhone"
                   class="form-control"
                   placeholder="Enter helper phone (optional)">
          </div>
        </div>
        
        <div class="form-actions">
          <button type="button" class="btn-secondary" (click)="resetForm()">Reset</button>
          <button type="submit" class="btn-primary" [disabled]="loading">
            <span *ngIf="loading" class="spinner-small"></span>
            <span *ngIf="!loading">Submit Request</span>
            <span *ngIf="loading">Submitting...</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
