<div class="settings-container">
  <div class="settings-card">
    <div class="settings-header">
      <h1>⚙️ Settings</h1>
      <p>Customize your application preferences</p>
    </div>
    
    <div class="settings-body">
      <div class="settings-section">
        <h2>Notification Preferences</h2>
        <div class="setting-item">
          <label class="switch-label">
            <input type="checkbox" [(ngModel)]="notifications.email">
            <span class="switch-slider"></span>
          </label>
          <div class="setting-info">
            <h3>Email Notifications</h3>
            <p>Receive updates via email</p>
          </div>
        </div>
        
        <div class="setting-item">
          <label class="switch-label">
            <input type="checkbox" [(ngModel)]="notifications.sms">
            <span class="switch-slider"></span>
          </label>
          <div class="setting-info">
            <h3>SMS Notifications</h3>
            <p>Receive updates via SMS</p>
          </div>
        </div>
        
        <div class="setting-item">
          <label class="switch-label">
            <input type="checkbox" [(ngModel)]="notifications.push">
            <span class="switch-slider"></span>
          </label>
          <div class="setting-info">
            <h3>Push Notifications</h3>
            <p>Receive browser notifications</p>
          </div>
        </div>
      </div>
      
      <div class="settings-section">
        <h2>Application Preferences</h2>
        
        <div class="setting-item">
          <div class="setting-info">
            <h3>Language</h3>
            <select [(ngModel)]="preferences.language" class="form-control">
              <option value="english">English</option>
              <option value="bengali">Bengali</option>
            </select>
          </div>
        </div>
        
        <div class="setting-item">
          <div class="setting-info">
            <h3>Theme</h3>
            <select [(ngModel)]="preferences.theme" class="form-control">
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </div>
        </div>
        
        <div class="setting-item">
          <div class="setting-info">
            <h3>Timezone</h3>
            <select [(ngModel)]="preferences.timezone" class="form-control">
              <option value="Asia/Dhaka">Asia/Dhaka (GMT+6)</option>
              <option value="Asia/Kolkata">Asia/Kolkata (GMT+5:30)</option>
            </select>
          </div>
        </div>
      </div>
      
      <div class="settings-actions">
        <button class="btn-secondary" (click)="resetSettings()">Reset to Default</button>
        <button class="btn-primary" (click)="saveSettings()">Save Settings</button>
      </div>
    </div>
  </div>
</div>
