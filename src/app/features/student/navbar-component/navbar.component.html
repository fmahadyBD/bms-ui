<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-brand">
      <a routerLink="/student-dashboard" class="brand-link">
        <span class="brand-text">Student Transport System</span>
      </a>
    </div>

    <div class="navbar-menu">
      <a routerLink="/student-dashboard" 
         routerLinkActive="active" 
         [routerLinkActiveOptions]="{exact: true}"
         class="nav-link">
        <span>Dashboard</span>
      </a>

      <a routerLink="/student-dashboard/new-bus-request" 
         routerLinkActive="active" 
         class="nav-link">
        <span>New Bus Request</span>
      </a>

      <a routerLink="/student-dashboard/survey" 
         routerLinkActive="active" 
         class="nav-link">
        <span>Survey</span>
      </a>

      <a routerLink="/student-dashboard/my-route" 
         routerLinkActive="active" 
         class="nav-link">
        <span>My Route</span>
      </a>

      <!-- Profile Dropdown -->
      <div class="profile-dropdown" #dropdown>
        <button class="profile-btn" (click)="toggleDropdown($event)">
          <div class="profile-avatar">
            <span>{{ studentName.charAt(0).toUpperCase() }}</span>
          </div>
          <span class="profile-name">{{ studentName }}</span>
          <span class="dropdown-icon" [class.rotate]="isProfileDropdownOpen">▼</span>
        </button>

        <div class="dropdown-menu" *ngIf="isProfileDropdownOpen">
          <div class="dropdown-header">
            <div class="dropdown-avatar">
              {{ studentName.charAt(0).toUpperCase() }}
            </div>
            <div class="dropdown-info">
              <div class="dropdown-name">{{ studentName }}</div>
              <div class="dropdown-email">{{ studentEmail }}</div>
            </div>
          </div>
          
          <div class="dropdown-divider"></div>
          
          <button (click)="navigateTo('profile')" class="dropdown-item">
            <span>👤 Profile</span>
          </button>
          
          <button (click)="navigateTo('settings')" class="dropdown-item">
            <span>⚙️ Settings</span>
          </button>
          
          <button (click)="navigateTo('change-password')" class="dropdown-item">
            <span>🔒 Change Password</span>
          </button>
          
          <div class="dropdown-divider"></div>
          
          <button (click)="logout()" class="dropdown-item logout-item">
            <span>🚪 Logout</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
